name: Dependabot auto-merge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-automerge:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'main' &&
      github.repository == 'Gryd-lock/grydlock-extension'
    runs-on: ubuntu-latest
    steps:
      - name: Read Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve eligible patch update
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' &&
          steps.metadata.outputs.maintainer-changes == 'false' &&
          (
            steps.metadata.outputs.package-ecosystem == 'github-actions' ||
            (
              steps.metadata.outputs.package-ecosystem == 'npm' &&
              steps.metadata.outputs.dependency-type == 'direct:development'
            )
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable squash auto-merge after required checks
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' &&
          steps.metadata.outputs.maintainer-changes == 'false' &&
          (
            steps.metadata.outputs.package-ecosystem == 'github-actions' ||
            (
              steps.metadata.outputs.package-ecosystem == 'npm' &&
              steps.metadata.outputs.dependency-type == 'direct:development'
            )
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
